<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>DM 자동화 — 인스타 자동기</title>
<link rel="stylesheet" href="common.css"><link rel="icon" href="brand/로고.png"><script src="data.js" defer></script><script src="app.js" defer></script>
</head><body>
<div class="nav"><div class="nav-in">
  <a class="logo" href="index.html"><img src="brand/로고3.png" alt="VG"><span class="t">인스타 <b>자동기</b></span></a>
  <div class="menu">
    <a href="index.html">스케줄</a>
    <a href="instagram.html">인스타 · 카드뉴스</a>
    <a href="threads.html">쓰레드</a>
    <a href="dm.html" class="on">DM 자동화</a>
  </div>
  <div class="meta" id="meta">불러오는 중…</div>
</div></div>
<div class="wrap">
<div class="hero"><h1>DM 자동화</h1><span class="tagpill">댓글 트리거 → 자동 DM</span></div>
<div class="stats" id="stats"></div>
<h2>채널별 DM 세팅 <small>트리거 단어 · DM 문구 · 링크 · 공개 답글</small></h2><div class="dmgrid" id="dm"></div>
</div>
<footer><div class="foot-in"><img src="brand/로고3.png" alt="VG"><span>VISIOGROWTH · INSTA AUTOGI</span></div></footer>
<script>
window.addEventListener('DOMContentLoaded',async()=>{
  const d=await getData();if(!d)return;setMeta(d);
  document.getElementById('stats').innerHTML=`
    <div class="stat red"><b>${d.dm.sent_total}</b><span>DM봇 발송 누적</span></div>
    <div class="stat"><b>${d.dm.littly.automations}</b><span>리틀리 자동화</span></div>
    <div class="stat"><b>${Object.keys(d.dm.rules||{}).filter(k=>!k.startsWith('_')).length}</b><span>봇 룰 설정 채널</span></div>
    <div class="stat"><b>${d.engine.self_pub_ready?'가동':'토큰 대기'}</b><span>DM봇 상태</span></div>`;
  const rules=d.dm.rules||{};
  const dmCards=Object.entries(rules).filter(([k])=>!k.startsWith('_')).map(([name,r])=>`
    <div class="dm"><div class="nm"><span style="display:flex;align-items:center;gap:10px">${av(HANDLES[name],LOGOS[name])} ${esc(name)}</span><span class="bdg on">봇 룰</span></div>
      <div class="lbl">트리거 댓글</div>${r.trigger.map(t=>`<span class="trig">${esc(t)}</span>`).join('')}
      <div class="lbl">자동 DM 내용</div><div class="msg">${linkify(r.dm)}</div>
      <div class="pub">↳ 공개 답글: ${esc(r.public_reply||'—')}</div></div>`);
  dmCards.push(`<div class="dm"><div class="nm"><span style="display:flex;align-items:center;gap:10px">${av('ai_insight.kr',LOGOS['AI인사이트'])} AI인사이트</span><span class="bdg on">리틀리</span></div>
    <div class="lbl">가동 중</div><div class="msg">${esc(d.dm.littly.note)}\n자동화 ${d.dm.littly.automations}종 (게시물 키워드 → 자료 DM)</div>
    <div class="pacts" style="margin-top:10px"><a class="alink" href="https://litt.ly/ai_insight.kr" target="_blank">리틀리 열기 →</a></div></div>`);
  if(rules._default)dmCards.push(`<div class="dm"><div class="nm">신규 채널 공통<span class="bdg wait">기본 템플릿</span></div>
    <div class="lbl">트리거</div>${rules._default.trigger.map(t=>`<span class="trig">${esc(t)}</span>`).join('')}
    <div class="lbl">DM 내용 (링크 채우면 가동)</div><div class="msg">${linkify(rules._default.dm)}</div></div>`);
  document.getElementById('dm').innerHTML=dmCards.join('');
});
</script></body></html>
