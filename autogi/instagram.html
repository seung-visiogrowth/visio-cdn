<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>인스타 · 카드뉴스 — 인스타 자동기</title>
<link rel="stylesheet" href="common.css"><link rel="icon" href="brand/로고.png"><script src="data.js" defer></script><script src="app.js" defer></script>
</head><body>
<div class="nav"><div class="nav-in">
  <a class="logo" href="index.html"><img src="brand/로고3.png" alt="VG"><span class="t">인스타 <b>자동기</b></span></a>
  <div class="menu">
    <a href="index.html">스케줄</a>
    <a href="instagram.html" class="on">인스타 · 카드뉴스</a>
    <a href="threads.html">쓰레드</a>
    <a href="dm.html">DM 자동화</a>
  </div>
  <div class="meta" id="meta">불러오는 중…</div>
</div></div>
<div class="wrap">
<div class="hero"><h1>인스타 · 카드뉴스</h1><span class="tagpill">채널 현황 · 발행물 · 아카이브</span></div>
<div class="stats" id="stats"></div>
<div class="chartrow">
  <div class="chartcard"><div class="ct">📊 채널별 발행 수</div><div class="cs">최근 발행 이력 기준</div><div id="chPubChart"></div></div>
  <div class="chartcard"><div class="ct">📈 팔로워 추이</div><div class="cs">일별 스냅샷 (메타 토큰 연동 후 자동 축적)</div><div id="folChart"></div></div>
</div>
<h2>채널 현황 & 인게이지먼트 <small>'게시물 미리보기'로 실제 피드 임베드</small></h2><div class="grid" id="channels"></div>
<h2>인스타 발행 완료 <small>게시물 임베드 지원</small></h2><div class="list" id="published"></div>
<h2>카드뉴스 아카이브 <small>발행 카드 원본</small></h2><div id="cardnews"></div>
</div>
<footer><div class="foot-in"><img src="brand/로고3.png" alt="VG"><span>VISIOGROWTH · INSTA AUTOGI</span></div></footer>
<script>
window.addEventListener('DOMContentLoaded',async()=>{
  const d=await getData();if(!d)return;setMeta(d);
  const totalFollowers=d.channels.reduce((a,c)=>a+((c.eng&&c.eng.followers)||0),0);
  const igPub=d.published.filter(p=>!isThreads(p));
  document.getElementById('stats').innerHTML=`
    <div class="stat red"><b>${totalFollowers?num(totalFollowers):'—'}</b><span>총 팔로워</span></div>
    <div class="stat"><b>${d.channels.filter(c=>c.professional).length}</b><span>프로페셔널</span></div>
    <div class="stat"><b>${igPub.length}</b><span>인스타 발행 (최근)</span></div>
    <div class="stat"><b>${(d.cardnews||[]).length}</b><span>카드뉴스 회차</span></div>`;
  const pubByCh={};d.published.forEach(p=>{if(!isThreads(p))pubByCh[p.channel]=(pubByCh[p.channel]||0)+1});
  document.getElementById('chPubChart').innerHTML=barChart(d.channels.filter(c=>c.handle).map(c=>({label:c.name,value:pubByCh[c.name]||0})),{h:200});
  const hist=d.eng_history||[];
  const palette=['#E43A25','#FF8A3C','#3DDC84','#4DA3FF','#C77DFF','#FFC24B','#FF6AA2','#9AA0A6'];
  const chs=d.channels.filter(c=>c.handle).map(c=>c.name);
  document.getElementById('folChart').innerHTML=lineChart(
    chs.map((n,i)=>({name:n,color:palette[i%palette.length],values:hist.map(hh=>(hh.channels[n]||{}).f??null)})),
    hist.map(hh=>hh.date.slice(5)),{h:200});
  document.getElementById('channels').innerHTML=d.channels.map((c,i)=>chCard(c,i,true)).join('');
  document.getElementById('published').innerHTML=igPub.length?igPub.map((p,i)=>postRow(p,'p'+i,true)).join(''):'<div class="empty">아직 없음</div>';
  document.getElementById('cardnews').innerHTML=(d.cardnews||[]).length?d.cardnews.map(ep=>`
    <div class="post" style="margin-bottom:10px"><div class="phead">${av(HANDLES[ep.channel],LOGOS[ep.channel])}
      <div><div class="chn">${esc(ep.channel)}</div><div class="when">${esc(ep.episode)}</div></div></div>
    <div class="cardstrip">${ep.cards.map(u=>`<a href="${u}" target="_blank"><img loading="lazy" src="${u}"></a>`).join('')}</div></div>`).join(''):'<div class="empty">아직 없음</div>';
});
</script></body></html>
