<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>쓰레드 — 인스타 자동기</title>
<link rel="stylesheet" href="common.css"><link rel="icon" href="brand/로고.png"><script src="data.js" defer></script><script src="app.js" defer></script>
</head><body>
<div class="nav"><div class="nav-in">
  <a class="logo" href="index.html"><img src="brand/로고3.png" alt="VG"><span class="t">인스타 <b>자동기</b></span></a>
  <div class="menu">
    <a href="index.html">스케줄</a>
    <a href="instagram.html">인스타 · 카드뉴스</a>
    <a href="threads.html" class="on">쓰레드</a>
    <a href="dm.html">DM 자동화</a>
  </div>
  <div class="meta" id="meta">불러오는 중…</div>
</div></div>
<div class="wrap">
<div class="hero"><h1>쓰레드</h1><span class="tagpill">채널별 쓰레드 발행 현황</span></div>
<div class="stats" id="stats"></div>
<div class="chartcard"><div class="ct">📈 쓰레드 발행 추이</div><div class="cs">최근 14일 — 쓰레드만</div><div id="thTrend"></div></div>
<h2>쓰레드 계정 <small>전 채널 개설 완료 (7/18) · API 연결은 토큰 후</small></h2><div class="grid" id="channels"></div>
<h2>쓰레드 발행 완료</h2><div class="list" id="published"></div>
<h2>쓰레드 예약</h2><div class="list" id="scheduled"></div>
</div>
<footer><div class="foot-in"><img src="brand/로고3.png" alt="VG"><span>VISIOGROWTH · INSTA AUTOGI</span></div></footer>
<script>
window.addEventListener('DOMContentLoaded',async()=>{
  const d=await getData();if(!d)return;setMeta(d);
  const thPub=d.published.filter(isThreads),thSch=d.scheduled.filter(p=>isThreads(p)||isBoth(p));
  document.getElementById('stats').innerHTML=`
    <div class="stat red"><b>${d.channels.filter(c=>c.threads).length}/${d.channels.length}</b><span>쓰레드 계정 개설</span></div>
    <div class="stat"><b>${thPub.length}</b><span>쓰레드 발행 (최근)</span></div>
    <div class="stat"><b>${thSch.length}</b><span>쓰레드 예약</span></div>
    <div class="stat"><b>${d.engine.self_pub_ready?'가동':'대기'}</b><span>Threads API</span></div>`;
  const thd={published:d.published.filter(isThreads),scheduled:d.scheduled.filter(p=>isThreads(p)||isBoth(p))};
  document.getElementById('thTrend').innerHTML=barChart(publishTrend(thd,14),{h:190});
  document.getElementById('channels').innerHTML=d.channels.filter(c=>c.threads||c.threads_url).map(c=>`
    <div class="ch"><div class="chtop">${av(c.handle,c.logo)}
      <div><div class="nm">${esc(c.name)}</div>
      <div class="hl">${c.threads_url?`<a href="${esc(c.threads_url)}" target="_blank">🧵 @${esc(c.handle)}</a>`:''}</div></div></div>
    <div class="badges">
      <span class="bdg on">쓰레드 계정 ⭕</span>
      ${c.self_pub?'<span class="bdg on">자동 발행</span>':'<span class="bdg wait">Threads 토큰 대기</span>'}
    </div>
    ${c.threads_url?`<a class="pv" style="display:block;text-align:center" href="${esc(c.threads_url)}" target="_blank">쓰레드 프로필 열기 ↗</a>`:''}
    </div>`).join('');
  document.getElementById('published').innerHTML=thPub.length?thPub.map((p,i)=>postRow(p,'p'+i,false)).join(''):'<div class="empty">아직 없음</div>';
  document.getElementById('scheduled').innerHTML=thSch.length?thSch.map((p,i)=>postRow(p,'s'+i,false)).join(''):'<div class="empty">예약 없음</div>';
});
</script></body></html>
