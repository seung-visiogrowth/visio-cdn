const num=n=>n==null?'—':n>=10000?(n/10000).toFixed(1)+'만':n.toLocaleString();
const fmtDue=d=>{if(!d)return '—';const t=new Date(d);return (t.getMonth()+1)+'/'+t.getDate()+' '+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')}
const av=(h,logo)=>logo?`<img class="av" loading="lazy" src="${logo}">`:h?`<img class="av" loading="lazy" src="https://unavatar.io/instagram/${encodeURIComponent(h)}" onerror="this.outerHTML='<span class=\\'av ph\\'>${esc((h||'?')[0].toUpperCase())}</span>'">`:`<span class="av ph">?</span>`;
let HANDLES={},LOGOS={};
function toggleEmbed(id,url){const el=document.getElementById(id);if(el.style.display==='block'){el.style.display='none';return}
  if(!el.dataset.loaded){el.innerHTML=`<iframe loading="lazy" src="${url}"></iframe>`;el.dataset.loaded=1}
  el.style.display='block'}
async function load(){
  const d=window.__DATA__||await (await fetch('/api/data')).json();
  d.channels.forEach(c=>{HANDLES[c.name]=c.handle;LOGOS[c.name]=c.logo});
  document.getElementById('meta').innerHTML=`${d.generated} 기준 · 머신 ${esc(d.host)}<br>자체발행기 ${d.engine.self_pub_ready?'🟢':'🟡 토큰 대기'} · 노션 ${d.engine.notion_ready?'🟢':'🟡'} · Buffer ${d.engine.buffer_ready?'🟢':'—'}`;
  document.getElementById('hostTag').textContent=d.engine.self_pub_ready?'자체발행기 가동 중':'메타 토큰 연동 대기';
  const live=d.channels.filter(c=>c.self_pub||c.buffer).length;
  const pro=d.channels.filter(c=>c.professional).length;
  const totalFollowers=d.channels.reduce((a,c)=>a+((c.eng&&c.eng.followers)||0),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat red"><b>${live}/${d.channels.length}</b><span>발행 연동 채널</span></div>
    <div class="stat"><b>${totalFollowers?num(totalFollowers):'—'}</b><span>총 팔로워 (연동 채널)</span></div>
    <div class="stat"><b>${pro}</b><span>프로페셔널 전환</span></div>
    <div class="stat"><b>${d.scheduled.length}</b><span>예약 대기</span></div>
    <div class="stat"><b>${d.published.length}</b><span>발행 완료 (최근)</span></div>
    <div class="stat"><b>${d.dm.sent_total+d.dm.littly.automations}</b><span>DM 자동화</span></div>`;
  document.getElementById('channels').innerHTML=d.channels.map((c,i)=>`
    <div class="ch"><div class="chtop">${av(c.handle,c.logo)}
      <div><div class="nm">${esc(c.name)}</div>
      <div class="hl">
        ${c.handle?`<a href="${esc(c.url)}" target="_blank">📷 @${esc(c.handle)}</a>`:`<span style="color:var(--mut);font-size:12px">${esc(c.status||'개설 대기')}</span>`}
        ${c.threads_url?`<a href="${esc(c.threads_url)}" target="_blank">🧵 쓰레드</a>`:''}
      </div></div></div>
    <div class="engrow">
      <div><b>${num(c.eng&&c.eng.followers)}</b><span>팔로워</span></div>
      <div><b>${num(c.eng&&c.eng.media)}</b><span>게시물</span></div>
      <div><b>${c.eng?c.eng.avg_eng:'—'}</b><span>평균 반응</span></div>
      <div><b>${num(c.eng&&c.eng.recent_comments)}</b><span>최근 댓글</span></div>
    </div>
    <div class="badges">
      ${c.professional?'<span class="bdg pro">프로페셔널 ⭕</span>':''}
      ${c.self_pub?'<span class="bdg on">자체발행기</span>':'<span class="bdg wait">토큰 대기</span>'}
      ${c.buffer?'<span class="bdg on">Buffer</span>':''}
      ${c.threads?'<span class="bdg on">쓰레드 ⭕</span>':''}
      ${c.dm?'<span class="bdg on">DM봇</span>':'<span class="bdg off">DM 미설정</span>'}
    </div>
    ${c.handle?`<button class="pv" onclick="toggleEmbed('emb${i}','https://www.instagram.com/${encodeURIComponent(c.handle)}/embed')">▾ 게시물 미리보기</button><div class="embed" id="emb${i}"></div>`:''}
    </div>`).join('');
  const row=(p,i,allowEmbed)=>{
    const h=HANDLES[p.channel]||p.channel;
    const permalink=p.link?(p.link.endsWith('/')?p.link:p.link+'/'):null;
    const emb=allowEmbed&&permalink&&permalink.includes('instagram.com')?`<button class="aghost" onclick="toggleEmbed('pemb${i}','${esc(permalink)}embed')">▾ 게시물 임베드</button>`:'';
    return `<div class="post"><div class="phead">${av(h,LOGOS[p.channel])}
      <div><div class="chn">${esc(p.channel)}</div><div class="when">${fmtDue(p.due)}</div></div>
      <span class="st ${['sent','발행완료'].includes(p.status)?'ok':['error','실패'].includes(p.status)?'er':'wt'}">${esc(p.status)}</span></div>
    <div class="txt">${esc(p.text)}</div>
    <div class="pacts">
      ${p.link?`<a class="alink" href="${esc(p.link)}" target="_blank">게시물 열기 →</a>`:''}
      ${emb}
      ${h&&!p.link?`<a class="aghost" href="https://www.instagram.com/${encodeURIComponent(h)}/" target="_blank">계정에서 보기</a>`:''}
      <span style="color:var(--mut);font-size:11px">${esc(p.src)}</span>
    </div>
    ${allowEmbed?`<div class="embed" id="pemb${i}"></div>`:''}
    ${p.error?`<div class="err">${esc(p.error.slice(0,120))}</div>`:''}</div>`};
  document.getElementById('scheduled').innerHTML=d.scheduled.length?d.scheduled.map((p,i)=>row(p,'s'+i,false)).join(''):'<div class="empty">예약된 발행 없음 — 노션 "통합 발행 캘린더"에 행 추가 시 표시</div>';
  document.getElementById('published').innerHTML=d.published.length?d.published.map((p,i)=>row(p,'p'+i,true)).join(''):'<div class="empty">아직 없음</div>';
  document.getElementById('cardnews').innerHTML=(d.cardnews||[]).length?d.cardnews.map(ep=>`
    <div class="post" style="margin-bottom:10px"><div class="phead">${av(HANDLES[ep.channel],LOGOS[ep.channel])}
      <div><div class="chn">${esc(ep.channel)}</div><div class="when">${esc(ep.episode)}</div></div></div>
    <div class="cardstrip">${ep.cards.map(u=>`<a href="${u}" target="_blank"><img loading="lazy" src="${u}"></a>`).join('')}</div></div>`).join(''):'<div class="empty">아직 없음</div>';
  if(d.failed.length){document.getElementById('failwrap').style.display='block';
    document.getElementById('failed').innerHTML=d.failed.map((p,i)=>row(p,'f'+i,false)).join('');}
  const rules=d.dm.rules||{};
  const dmCards=Object.entries(rules).filter(([k])=>!k.startsWith('_')).map(([name,r])=>`
    <div class="dm"><div class="nm"><span style="display:flex;align-items:center;gap:10px">${av(HANDLES[name],LOGOS[name])} ${esc(name)}</span><span class="bdg on">봇 룰</span></div>
      <div class="lbl">트리거 댓글</div>${r.trigger.map(t=>`<span class="trig">${esc(t)}</span>`).join('')}
      <div class="lbl">자동 DM 내용</div><div class="msg">${linkify(r.dm)}</div>
      <div class="pub">↳ 공개 답글: ${esc(r.public_reply||'—')}</div></div>`);
  dmCards.push(`<div class="dm"><div class="nm"><span style="display:flex;align-items:center;gap:10px">${av('ai_insight.kr',LOGOS['AI인사이트'])} AI인사이트</span><span class="bdg on">리틀리</span></div>
    <div class="lbl">가동 중</div><div class="msg">${esc(d.dm.littly.note)}\n자동화 ${d.dm.littly.automations}종 (게시물 키워드 → 자료 DM)</div>
    <div class="pacts" style="margin-top:10px"><a class="alink" href="https://litt.ly/ai_insight.kr" target="_blank">리틀리 열기 →</a></div></div>`);
  if(rules._default)dmCards.push(`<div class="dm"><div class="nm">신규 채널 공통<span class="bdg wait">기본 템플릿</span></div>
    <div class="lbl">트리거</div>${rules._default.trigger.map(t=>`<span class="trig">${esc(t)}</span>`).join('')}
    <div class="lbl">DM 내용 (링크 채우면 가동)</div><div class="msg">${linkify(rules._default.dm)}</div></div>`);
  document.getElementById('dm').innerHTML=dmCards.join('');
}
load();if(!window.__DATA__)setInterval(load,60000);
</script></body></html>
